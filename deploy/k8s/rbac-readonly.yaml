apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-readonly-dashboard-viewer
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods", "services", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-readonly-dashboard-viewer
subjects:
  - kind: ServiceAccount
    name: k8s-readonly-dashboard
    namespace: k8s-readonly-dashboard
roleRef:
  kind: ClusterRole
  name: k8s-readonly-dashboard-viewer
  apiGroup: rbac.authorization.k8s.io
