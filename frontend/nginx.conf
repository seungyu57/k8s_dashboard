server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Backend API is exposed as a Kubernetes Service in the same namespace.
    # Same-origin /api avoids browser CORS issues for the deployed SPA.
    location /api/ {
        proxy_pass http://k8s-dashboard-backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://k8s-dashboard-backend:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Router / SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
